<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>우리아기 이유식 🍼</title>
  <meta name="theme-color" content="#fb7185" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="우리아기 이유식" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root"></div>

  <!-- ═══════════════════════════════════════════
       🔥 Firebase 설정
       Firebase Console → 프로젝트 설정 → 내 앱 → SDK 설정
       아래 값을 본인 Firebase 값으로 교체하세요!
  ════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      initializeAuth, indexedDBLocalPersistence,
      signInAnonymously, onAuthStateChanged,
      linkWithCredential, EmailAuthProvider, signInWithEmailAndPassword, unlink
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, doc, setDoc, deleteDoc,
      onSnapshot, writeBatch, query, where
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBeyTNKEtaf9_M99Att2TL-G9dsTdkWChk",
      authDomain:        "baby-meal-recipe.firebaseapp.com",
      projectId:         "baby-meal-recipe",
      storageBucket:     "baby-meal-recipe.firebasestorage.app",
      messagingSenderId: "165719026913",
      appId:             "1:165719026913:web:04751081edf070b19d5ba0"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = initializeAuth(app, {
      persistence: indexedDBLocalPersistence
    });
    const db   = getFirestore(app);

    window._db       = db;
    window._auth     = auth;
    window._firebase = {
      collection, doc, setDoc, deleteDoc,
      onSnapshot, writeBatch, query, where
    };
    window._authFns = {
      linkWithCredential, EmailAuthProvider, signInWithEmailAndPassword, unlink
    };

    // 기존 세션 없을 때만 익명 로그인
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window._uid = user.uid;
        window._firebaseReady = true;
        window.dispatchEvent(new CustomEvent("authChanged", { detail: { user } }));
        if (!window._authInitialized) {
          window._authInitialized = true;
          window.dispatchEvent(new Event("firebaseReady"));
        }
      } else {
        signInAnonymously(auth).catch(console.error);
      }
    });
  </script>

  <script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
